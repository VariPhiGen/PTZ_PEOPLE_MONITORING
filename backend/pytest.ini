[pytest]
asyncio_mode       = auto
testpaths          = tests
python_files       = test_*.py
python_classes     = Test*
python_functions   = test_*
timeout            = 60
log_cli            = true
log_cli_level      = WARNING
log_format         = %(asctime)s %(levelname)-8s %(name)s  %(message)s
log_date_format    = %H:%M:%S
addopts            =
    --tb=short
    -q
    --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: marks tests that require a real NVIDIA GPU
    kafka: marks tests that require a running Kafka broker
    minio: marks tests that require a running MinIO instance
    integration: end-to-end tests that need all services
