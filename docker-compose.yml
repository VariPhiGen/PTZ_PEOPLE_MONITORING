# ACAS — host ports chosen to avoid conflicts on this machine.
# Container ports stay standard; only left-hand (host) ports differ.
# Override any port via the matching *_HOST_PORT variable in .env.
#
# Ports in use on host (skipped):  8000, 5432, 6379, 9000, 9001, 8081
# Ports free:                       5433, 9092
#
# Host → Container map:
#   nginx proxy    7080  → 80     (Cloudflare tunnel entry point)
#   backend        18000 → 8000
#   postgres       15432 → 5432
#   timescaledb     5433 → 5432
#   redis          16379 → 6379
#   minio API      19000 → 9000   console 19001 → 9001
#   kafka           9092 → 9092   (PLAINTEXT_HOST; internal uses kafka:19092)
#   schema-registry 18081 → 8081

services:

  # ── Nginx reverse proxy — Cloudflare entry point ───────────────────────────
  # Routes: /api/* → backend (18000)  |  /* → dashboard (3020)
  # Cloudflare tunnel must point to http://localhost:7080
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: acas-nginx
    restart: unless-stopped
    ports:
      - "7080:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
    image: acas-backend:gpu
    container_name: acas-backend
    restart: unless-stopped
    runtime: nvidia
    # host networking so the backend can reach IP cameras on the LAN directly
    network_mode: host
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "18000", "--reload"]
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
      # Expose pip-installed nvidia CUDA/cuDNN libs to onnxruntime-gpu
      LD_LIBRARY_PATH: /usr/local/lib/python3.11/dist-packages/nvidia/cudnn/lib:/usr/local/lib/python3.11/dist-packages/nvidia/cublas/lib:/usr/local/lib/python3.11/dist-packages/nvidia/cuda_runtime/lib:/usr/local/cuda/lib64
      # With host networking, use localhost + the host-side ports for all services
      DATABASE_URL: postgresql+asyncpg://acas:${POSTGRES_PASSWORD:-acas}@localhost:15432/acas
      TIMESCALE_URL: postgresql+asyncpg://acas:${TIMESCALE_PASSWORD:-acas}@localhost:5433/acas_ts
      REDIS_URL: redis://localhost:16379/0
      MINIO_ENDPOINT: localhost:19000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-acasminio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-acasminiochange}
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      KAFKA_SCHEMA_REGISTRY_URL: http://localhost:18081
      MODEL_DIR: /models
      GPU_DEVICE_ID: ${GPU_DEVICE_ID:-0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-use-rsa-pem-for-rs256}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-RS256}
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-}
      NODE_ID: ${NODE_ID:-}
      NODE_NAME: ${NODE_NAME:-acas-node-1}
      NODE_LOCATION: ${NODE_LOCATION:-Local Machine}
      NODE_API_ENDPOINT: ${NODE_API_ENDPOINT:-http://localhost:18000}
    volumes:
      - ./models:/models
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic:ro
      - ./data/face-enrollment:/enrollment-images
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      kafka:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: acas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: acas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acas}
      POSTGRES_DB: acas
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - acas_pg_data:/var/lib/postgresql/data
      - ./scripts/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/01-init-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acas -d acas"]
      interval: 5s
      timeout: 5s
      retries: 10

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: acas-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: acas
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-acas}
      POSTGRES_DB: acas_ts
    ports:
      - "${TIMESCALE_HOST_PORT:-5433}:5432"
    volumes:
      - acas_ts_data:/var/lib/postgresql/data
      - ./scripts/timescaledb/init-detection-log.sql:/docker-entrypoint-initdb.d/01-init-detection-log.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acas -d acas_ts"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: acas-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --maxmemory-samples 10
      --appendonly no
      --save ""
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - acas_redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: acas-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-acasminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-acasminiochange}
      MINIO_STORAGE_CLASS_STANDARD: "EC:0"
      # Lower disk-full threshold to 2 GB (default is 5% of total disk = ~180 GB on a 3.6 TB drive)
      MINIO_VOLUMES_WATERMARK_LOW: "2147483648"    # 2 GB
      MINIO_VOLUMES_WATERMARK_HIGH: "4294967296"   # 4 GB
      MINIO_SITE_MINIMUM_FREE_DRIVE: "2147483648"  # 2 GB — newer MinIO env var
    ports:
      - "${MINIO_API_HOST_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-19001}:9001"
    volumes:
      - acas_minio_data:/data

  kafka:
    # Kafka 3.9.2 — KRaft, no ZooKeeper. Mirrors Apache single-node plaintext example.
    # Internal services connect to PLAINTEXT listener on kafka:19092.
    # Host clients connect via PLAINTEXT_HOST on localhost:9092 (mapped below).
    # user: root required so the process can write to the named Docker volume.
    image: apache/kafka:3.9.2
    hostname: kafka
    container_name: acas-kafka
    restart: unless-stopped
    user: root
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "${KAFKA_CLUSTER_ID:-4L6g3nShT-eMCtK--X86sw}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: "/var/lib/kafka/kraft-combined-logs"
    volumes:
      - acas_kafka_data:/var/lib/kafka/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:19092 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 45s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: acas-schema-registry
    restart: unless-stopped
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:19092
    ports:
      - "${SCHEMA_REGISTRY_HOST_PORT:-18081}:8081"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  acas_pg_data:
  acas_ts_data:
  acas_redis_data:
  acas_minio_data:
  acas_kafka_data:

networks:
  default:
    name: acas-net
